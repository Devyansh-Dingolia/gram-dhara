<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Gram Dhara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../../images/fab-icon.png" alt="Gram Dhara Logo" class="sidebar-logo">
                <h3>Gram Dhara</h3>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="../user-dashboard.html"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
                    </li>
                    <li>
                        <a href="../notices/notices.html"><i class="bi bi-megaphone"></i> <span>Notices</span></a>
                    </li>
                    <li>
                        <a href="../new-complaint/new-complaint.html"><i class="bi bi-plus-circle"></i> <span>New
                                Report</span></a>
                    </li>
                    <li>
                        <a href="../my-reports/my-reports.html"><i class="bi bi-list-check"></i> <span>My Reports</span></a>
                    </li>
                    <li>
                        <a href="../water-quality/water-quality.html"><i class="bi bi-droplet"></i> <span>Water Quality</span></a>
                    </li>
                    <li>
                        <a href="../pump-status/pump-status.html"><i class="bi bi-activity"></i> <span>Pump Status</span></a>
                    </li>
                    <li>
                        <a href="../notifications/notifications.html"><i class="bi bi-bell"></i> <span>Notifications</span></a>
                    </li>
                    <li class="active">
                        <a href="settings.html"><i class="bi bi-gear"></i> <span>Settings</span></a>
                    </li>
                    <li class="separator"></li>
                    <li>
                        <a href="../../../../index.html" class="logout"><i class="bi bi-box-arrow-right"></i>
                            <span>Logout</span></a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>&copy; 2025 Gram Dhara</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
                <span class="hamburger"></span>
            </button>

            <!-- Top Header with user info and search -->
            <header class="dashboard-header">
                <div class="search-container">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search...">
                </div>

                <div class="user-menu">
                    <button class="notifications" id="notification-link">
                        <i class="bi bi-bell"></i>
                        <span class="badge">4</span>
                    </button>

                    <div class="user-profile">
                        <img src="../../../images/avatar.png" alt="User Profile">
                        <div class="user-info">
                            <h4 id="user-name">User</h4>
                            <p id="user-role">Village Water Committee</p>
                        </div>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                </div>
            </header>

            <section class="user-profile-card">
                <div class="profile-card-header">
                    <div class="profile-avatar-container">
                        <img src="https://img.icons8.com/?size=100&id=9q3GMpxNIMjC&format=png&color=000000"
                            alt="User Avatar" id="profile-avatar">
                    <div class="profile-header-info">
                        <h2 id="profile-name-header">Loading...</h2>
                        <p id="profile-role" class="role-badge">Loading...</p>
                    </div>
                </div>

                <div class="profile-card-body">
                    <form id="profile-details-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profile-name">Full Name</label>
                                <input type="text" id="profile-name" value="Loading..." disabled>
                            </div>
                            <div class="form-group">
                                <label for="profile-username">Username</label>
                                <input type="text" id="profile-username" value="Loading..." disabled>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profile-email">Email Address</label>
                                <input type="email" id="profile-email" value="Loading..." disabled>
                            </div>
                            <div class="form-group">
                                <label for="profile-phone">Phone Number</label>
                                <input type="text" id="profile-phone" value="Loading..." disabled>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="profile-userid">User ID</label>
                            <input type="text" id="profile-userid" value="Loading..." disabled>
                        </div>
                    </form>
                </div>
            </section>

        </main>
    </div>
    <!-- API Client Script -->
    <script src="../../../js/api-client.js"></script>
    <script src="script.js"></script>
</body>

</html>
