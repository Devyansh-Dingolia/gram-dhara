<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications- Gram Dhara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../../images/fab-icon.png" alt="Gram Dhara Logo" class="sidebar-logo">
                <h3>Gram Dhara</h3>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="../user-dashboard.html"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
                    </li>
                    <li>
                        <a href="../notices/notices.html"><i class="bi bi-megaphone"></i> <span>Notices</span></a>
                    </li>
                    <li>
                        <a href="../new-complaint/new-complaint.html"><i class="bi bi-plus-circle"></i> <span>New
                                Report</span></a>
                    </li>
                    <li>
                        <a href="../my-reports/my-reports.html"><i class="bi bi-list-check"></i> <span>My
                                Reports</span></a>
                    </li>
                    <li>
                        <a href="../water-quality/water-quality.html"><i class="bi bi-droplet"></i> <span>Water
                                Quality</span></a>
                    </li>
                    <li>
                        <a href="../pump-status/pump-status.html"><i class="bi bi-activity"></i> <span>Pump
                                Status</span></a>
                    </li>
                    <li class="active">
                        <a href="notifications.html"><i class="bi bi-bell"></i> <span>Notifications</span></a>
                    </li>
                    <li>
                        <a href="../settings/settings.html"><i class="bi bi-gear"></i> <span>Settings</span></a>
                    </li>
                    <li class="separator"></li>
                    <li>
                        <a href="../../../../index.html" class="logout"><i class="bi bi-box-arrow-right"></i>
                            <span>Logout</span></a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>&copy; 2025 Gram Dhara</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <button class="mobile-nav-toggle" aria-controls="primary-navigation" aria-expanded="false">
                <span class="sr-only">Menu</span>
                <div class="hamburger-icon">
                    <span class="line line-1"></span>
                    <span class="line line-2"></span>
                    <span class="line line-3"></span>
                </div>
            </button>

            <!-- Top Header with user info and search -->
            <header class="dashboard-header">
                <div class="search-container">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search...">
                </div>

                <div class="user-menu">
                    <button class="notifications" id="notification-link">
                        <i class="bi bi-bell"></i>
                        <span class="badge">4</span>
                    </button>

                    <div class="user-profile">
                        <img src="../../../images/avatar.png" alt="User Profile">
                        <div class="user-info">
                            <h4 id="user-name">User</h4>
                            <p id="user-role">Village Water Committee</p>
                        </div>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                </div>
            </header>

            <section class="page-header">
                <h1>Notifications</h1>
                <p>Stay updated with alerts related to your complaints</p>
            </section>

            <section class="notifications-section">
                <div class="notifications-header">
                    <div class="filter-buttons">
                    </div>
                    <div class="notifications-controls">
                        <button id="mark-all-read-btn">Mark All as Read</button>
                    </div>
                </div>

                <div class="loading-spinner" id="loading-spinner" style="display: none;"><i
                        class="bi bi-arrow-repeat"></i></div>

                <div class="error-message" id="error-message" style="display: none;"></div>

                <div id="notifications-container">
                </div>
            </section>
        </main>
    </div>
    <!-- API Client Script -->
    <script src="../../../js/api-client.js"></script>
    <script src="script.js"></script>
    <script src="../responsive.js"></script>
</body>

</html>
